<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart - Online Shopping</title>
    <link rel="icon" href="Images/logo.png" type="image/png">
</head>

<body>
    <nav class="navbar">
        <img src="Images/Flipkart.png" width="223" alt="">
        <form action="">
            <input type="search" placeholder="Search for Products, Brands and More">
        </form>

        <div class="login-container">
            <button class="login-btn">Login ⌄</button>

            <div class="login-dropdown">
                <p class="new">New customer? <span>Sign Up</span></p>
                <a href="#">My Profile</a>
                <a href="#">Orders</a>
                <a href="#">Wishlist</a>
                <a href="#">Rewards</a>
                <a href="#">Gift Cards</a>
            </div>
        </div>

        <a href="">
            <img src="Images/cart.image.svg" alt="">
            Cart
        </a>

        <a href="">
            <img src="Images/cart.image.svg" alt="">
            Become a Seller
        </a>


        <div class="more-menu">
            <button class="dot-btn">⋮</button>
            <div class="threedot-dropdown">
                <a href="">Notification</a>
                <a href="">24*7 Customer Support</a>
                <a href="">Advertise</a>
                <a href="">Logout</a>
            </div>

        </div>

    </nav>

    <nav class="category-bar">
        <a href="#">
            <img src="Images/Mobile.png" alt="Mobile">
            Mobile
        </a>
        <a href="#">
            <img src="Images/Mobile.png" alt="Electronics">
            Electronics
        </a>
        <a href="#">Flipkart Minutes</a>
        <a href="#">Offers </a>
    </nav>

</html>
