<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Exercise 5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .nav {
            border: 2px solid black;
            display: flow-root;
            background-color: aquamarine;
            position: sticky;
            top: 0;
        }

        .nav ul {
            list-style: none;
            display: flex;
        }

        .nav ul li {
            padding: 50px;
            flex: 1;

        }

        .container {
            border: 2px solid black;
            height: 80vh;
            background-color: green;
            margin: 10px;
            display: flex;
        }

        .child1 {
            border: 2px solid black;
            width: 500px;
            height: 400px;
            margin-left: 200px;
            margin-top: 80px;
            background-color: palevioletred;

        }

        .child2 {
            border: 2px solid black;
            width: 500px;
            height: 400px;
            margin-left: 200px;
            margin-top: 80px;
            background-color: lightskyblue;
        }

        .content {
            border: 2px solid black;
            width: 60vw;
            height: 200px;
            margin: 10px 300px 10px 300px;
            border-radius: 100px;

        }

        .content p {
            text-align: center;
            font-size: 80px;
            text-shadow: 2px 2px 4px orangered;;
        }

        .foot {
            border: 2px solid black;
            height: 100px;
            background-color: aqua;
        }

        .foot p {
            text-align: center;
            font-size: 60px;
            padding-top: 30px;
            text-shadow: 3px 3px 5px red;
        }

        .logo {
            position: fixed;
            bottom: 20px;
            right: 16px;
            z-index: 1000;
        }

        .logo img {
            width: 80px;
            height: 80px;
        }
    </style>
</head>

<body>
    <header>
        <nav class="nav">
            <div class="navDiv">
                <ul>
                    <li>Home</li>
                    <li>About</li>
                    <li>Contact</li>
                    <li>Services</li>
                </ul>
            </div>
        </nav>
        <div class="container">
            <div class="child1"></div>
            <div class="child2"></div>
        </div>
        <div class="content">
            <p>Welcome to this Sigma Web Development Express</p>

        </div>
        <div class="logo">
            <img src="logo.png" alt="logo">
        </div>
    </header>
    <footer class="mainFooter">
        <div class="foot">
            <p>That all for this project hope you enjoy my code</p>
        </div>
    </footer>
</body>

</html>
