<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selector</title>
    <style>
        /* Element Selector */
        div { 
            /* color: red; */
            /* background-color: yellow; */
        }
        /* class selector */
        .red {
            /* background-color: yellow; */
        }
        /* id selector */
        #green {
            /* color: mediumorchid; */
        }
        /* child selector */
        div > p {
            color : red;
        }
        /* descendant selector */
        div p {
            color: blue;
        }
        /* Universal Selector */
        * {
            margin : 0;
            padding: 0;
        }
        /* Pseudo Selector  */
        a :visited {
            color : yellow;
        }
          a:link {
            color: green;
        }

        a:active{
            background-color: red;
        }

        a:hover{
            background-color: yellow;
        }


        p:first-child{
            background-color: aqua;
        }

    </style>
</head>
<body>
    <main class = "one">
        <p>I am first child</p>
        <p>I am second child</p>
    </main>
    <div class ="red">
      I am a div
      <p>I am para1 inside a div</p>
      <article> 
        <p>I am a para inside a div article</p>
      </article>
    </div>
    <div id = "green"> 
        I am a another div
    </div>
    <a href="https://www.google.com">Go to Google</a>
    <a href="https://www.facebook2.com">Go to Facebook</a>
</body>
</html>
