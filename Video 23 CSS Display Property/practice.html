<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
    <style>
        .box {
            border: 2px solid green;
            padding: 20px;
            margin: 10px;
            width: 300px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
        
            grid-template-rows: repeat(2,1fr);
            gap: 10px;
        }
