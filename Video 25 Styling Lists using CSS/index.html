<!DOCTYPE html>
<html lang="en">
<head>

    <title>Styling Lists using CSS</title>
    <style>
        .nav-list {
           display: flex;

        nav ul li {
             list-style: none;
             padding: 23px;

             border: 2px solid black; */

        }

        </ul>
         
    </nav>

</html>
